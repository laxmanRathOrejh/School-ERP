name: school_erp
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.0.2
  pin_code_fields: ^9.1.0
  provider: ^6.1.5+1
  http: ^1.6.0
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  table_calendar: ^3.2.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/image/
    - assets/lottie/
  #   - images/a_dot_ham.jpeg
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/appican.jpeg"

  # To add assets to your application, add an assets section, like this:
